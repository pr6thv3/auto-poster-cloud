name: Fetch YouTube Analytics

on:
  workflow_dispatch:
    inputs:
      mock_mode:
        description: "Run in mock mode (does not fetch from YouTube API)"
        required: true
        default: "true"
        type: string
      commit_results:
        description: "Commit the updated history results back to repository"
        required: true
        default: "false"
        type: string

permissions:
  contents: write

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch Analytics
        env:
          MOCK_MODE: ${{ github.event.inputs.mock_mode }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python scripts/fetch_youtube_analytics.py

      - name: Commit Content History
        if: github.event.inputs.commit_results == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/content-history.json
          git commit -m "Update YouTube analytics stats [skip ci]" || echo "No changes to commit"
          if [ -n "${{ secrets.GITHUB_DISPATCH_TOKEN }}" ]; then
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_DISPATCH_TOKEN }}@github.com/${{ github.repository }}.git
          else
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
          git push origin main || echo "Failed to push updates"
