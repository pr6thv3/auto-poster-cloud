name: Generate and Post YouTube Short

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Video subject/topic"
        required: true
        type: string
      niche:
        description: "Niche/category (e.g. ai, history)"
        required: true
        default: "ai"
        type: string
      generation_mode:
        description: "Video generation mode (mock, real)"
        required: true
        default: "mock"
        type: string
      metadata_mode:
        description: "Metadata generation mode (mock, real)"
        required: true
        default: "mock"
        type: string
      posting_mode:
        description: "Posting execution mode (mock, real)"
        required: true
        default: "mock"
        type: string
      privacy:
        description: "Privacy setting (private, unlisted, public)"
        required: true
        default: "private"
        type: string
      queue_item_id:
        description: "Queue item ID (for scheduled runs)"
        required: false
        default: ""
        type: string
      llm_provider:
        description: "LLM Provider override (gemini, openai, nvidia)"
        required: false
        default: ""
        type: string
      allow_mock_metadata_fallback:
        description: "Allow mock metadata fallback if LLM fails (true, false)"
        required: false
        default: "false"
        type: string
      job_id:
        description: "Unique job identifier for tracking"
        required: false
        type: string
      use_video_brief:
        description: "Use docs/video-brief.json as the source of truth"
        required: false
        default: "false"
        type: string
      profile_path:
        description: "Path to content engine profile"
        required: false
        default: "profiles/ai_tools.yml"
        type: string
      run_content_engine:
        description: "Run content engine pipeline first"
        required: false
        default: "false"
        type: string


permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: auto-poster
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix ImageMagick Policy
        run: |
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@\*" -->/g' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<!-- <policy domain="path" rights="none" pattern="@\*" -->/g' /etc/ImageMagick-7/policy.xml || true

      - name: Install FFmpeg and ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Content Engine Pipeline
        if: github.event.inputs.run_content_engine == 'true'
        run: |
          python scripts/generate_ideas.py --profile ${{ github.event.inputs.profile_path }}
          python scripts/score_idea_freshness.py
          python scripts/build_video_brief.py
          python scripts/quality_gate.py

      - name: Generate YouTube Metadata
        id: generate-metadata
        env:
          USE_VIDEO_BRIEF: ${{ github.event.inputs.use_video_brief }}
          TOPIC: ${{ github.event.inputs.topic }}
          NICHE: ${{ github.event.inputs.niche }}
          METADATA_MODE: ${{ github.event.inputs.metadata_mode }}
          POSTING_MODE: ${{ github.event.inputs.posting_mode }}
          ALLOW_MOCK_METADATA_FALLBACK: ${{ github.event.inputs.allow_mock_metadata_fallback || secrets.ALLOW_MOCK_METADATA_FALLBACK || 'false' }}
          LLM_PROVIDER: ${{ github.event.inputs.llm_provider || secrets.LLM_PROVIDER || 'gemini' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_NAME: ${{ secrets.OPENAI_MODEL_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_NAME: ${{ secrets.GEMINI_MODEL_NAME }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL_NAME: ${{ secrets.NVIDIA_MODEL_NAME }}
        run: |
          python scripts/generate_youtube_metadata.py

      - name: Run MoneyPrinterTurbo (Real Generation)
        if: github.event.inputs.generation_mode == 'real'
        id: run-mpt-real
        env:
          USE_VIDEO_BRIEF: ${{ github.event.inputs.use_video_brief }}
          TOPIC: ${{ github.event.inputs.topic }}
          TITLE: ${{ steps.generate-metadata.outputs.youtube_title }}
          MOCK_MODE: 'false'
          LLM_PROVIDER: ${{ github.event.inputs.llm_provider || secrets.LLM_PROVIDER || 'gemini' }}
          VIDEO_SOURCE: ${{ secrets.VIDEO_SOURCE }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_NAME: ${{ secrets.OPENAI_MODEL_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_NAME: ${{ secrets.GEMINI_MODEL_NAME }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: ${{ secrets.NVIDIA_BASE_URL }}
          NVIDIA_MODEL_NAME: ${{ secrets.NVIDIA_MODEL_NAME }}
        run: |
          python scripts/run_moneyprinterturbo.py > moneyprinter-log.txt 2>&1

      - name: Mock Video Generation (Bypass MPT)
        if: github.event.inputs.generation_mode != 'real'
        id: run-mpt-mock
        run: |
          echo "[MOCK] Generating dummy video..." > moneyprinter-log.txt
          python -c "
          import os
          output_dir = 'storage/tasks/mock-task'
          os.makedirs(output_dir, exist_ok=True)
          output_path = os.path.join(output_dir, 'final-1.mp4')
          with open(output_path, 'wb') as f:
              f.write(b'0' * 150000)
          print('Wrote dummy MP4 file.')
          " >> moneyprinter-log.txt

      - name: Find Output Video & Validate
        id: find-video
        env:
          GENERATION_MODE: ${{ github.event.inputs.generation_mode }}
        run: |
          python scripts/find_latest_video.py

      - name: Upload to Cloudflare R2 (Optional)
        id: upload-r2
        continue-on-error: true
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          NICHE: ${{ github.event.inputs.niche }}
          MOCK_MODE: ${{ github.event.inputs.generation_mode == 'mock' && 'true' || 'false' }}
        run: |
          python scripts/upload_r2.py

      - name: Post to YouTube
        id: post-youtube
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PRIVACY: ${{ github.event.inputs.privacy }}
          VIDEO_PATH: ${{ steps.find-video.outputs.video_path }}
          POSTING_MODE: ${{ github.event.inputs.posting_mode }}
          QUEUE_ITEM_ID: ${{ github.event.inputs.queue_item_id }}
          MOCK_MODE: 'false'
        run: |
          python scripts/post_youtube.py

      - name: Update docs/content-queue.json in Repository
        if: always() && github.event.inputs.queue_item_id != ''
        env:
          QUEUE_ITEM_ID: ${{ github.event.inputs.queue_item_id }}
          YT_STATUS: ${{ steps.post-youtube.outputs.youtube_status }}
          YT_VIDEO_ID: ${{ steps.post-youtube.outputs.youtube_video_id }}
          YT_ERROR: ${{ steps.post-youtube.outputs.youtube_error }}
        run: |
          python scripts/update_queue.py
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/content-queue.json
          git commit -m "Update queue item ${{ github.event.inputs.queue_item_id }} [skip ci]" || echo "No changes to commit"
          if [ -n "${{ secrets.GITHUB_DISPATCH_TOKEN }}" ]; then
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_DISPATCH_TOKEN }}@github.com/${{ github.repository }}.git
          else
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
          git push origin main || echo "Failed to push updates"

      - name: Write Job Summary
        if: always()
        env:
          USE_VIDEO_BRIEF: ${{ github.event.inputs.use_video_brief }}
          TOPIC: ${{ github.event.inputs.topic }}
          NICHE: ${{ github.event.inputs.niche }}
          PRIVACY: ${{ github.event.inputs.privacy }}
          GENERATION_MODE: ${{ github.event.inputs.generation_mode }}
          METADATA_MODE: ${{ github.event.inputs.metadata_mode }}
          POSTING_MODE: ${{ github.event.inputs.posting_mode }}
          VIDEO_PATH: ${{ steps.find-video.outputs.video_path }}
          PUBLIC_VIDEO_URL: ${{ steps.upload-r2.outputs.public_video_url }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          python scripts/write_summary.py

      - name: Upload Logs and Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posting-logs-${{ github.event.inputs.job_id || github.run_id }}
          if-no-files-found: ignore
          path: |
            platform-results.json
            run-log.json
            youtube-result.json
            youtube-metadata.json
            video-info.json
            moneyprinter-log.txt
            docs/generated-ideas.json
            docs/scored-ideas.json
            docs/video-brief.json
            docs/quality-report.json

      - name: Run R2 Cleanup (Mock)
        if: always()
        run: |
          python scripts/cleanup_r2.py

      - name: Check for Failures
        if: always()
        run: |
          if [ -f youtube-result.json ]; then
            if grep -q '"youtube_status": "failed"' youtube-result.json; then
              echo "Error: YouTube posting task failed!"
              exit 1
            fi
          fi

      - name: Comment on Tracking Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ vars.TRACKING_ISSUE_NUMBER }}
        run: |
          if [ -n "$ISSUE_NUMBER" ]; then
            COMMENT_BODY="❌ **auto-poster-cloud YouTube Shorts Generation/Posting Pipeline Failed!**\n\n* **Run ID**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n* **Job ID**: ${{ github.event.inputs.job_id }}\n* **Topic**: ${{ github.event.inputs.topic }}\n\nPlease check the Actions logs and the job summary for failure details."
            gh issue comment "$ISSUE_NUMBER" --body "$COMMENT_BODY"
          else
            echo "No TRACKING_ISSUE_NUMBER variable set. Skipping issue comment."
          fi
